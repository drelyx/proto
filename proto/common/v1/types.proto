syntax = "proto3";

package drelyx.common.v1;

option go_package = "github.com/drelyx/proto/gen/go/common/v1;commonv1";

import "google/protobuf/timestamp.proto";

// ServerState describes the lifecycle state of a managed game server.
enum ServerState {
  // SERVER_STATE_UNSPECIFIED is returned when the agent cannot determine state.
  SERVER_STATE_UNSPECIFIED = 0;
  // SERVER_STATE_STARTING indicates the server process is booting.
  SERVER_STATE_STARTING = 1;
  // SERVER_STATE_RUNNING indicates the server is online and accepting work.
  SERVER_STATE_RUNNING = 2;
  // SERVER_STATE_STOPPING indicates a graceful shutdown is in progress.
  SERVER_STATE_STOPPING = 3;
  // SERVER_STATE_STOPPED indicates the server process is not running.
  SERVER_STATE_STOPPED = 4;
  // SERVER_STATE_CRASHED indicates the server exited unexpectedly.
  SERVER_STATE_CRASHED = 5;
}

// ErrorCode provides a stable machine-readable error surface across services.
enum ErrorCode {
  // ERROR_CODE_UNSPECIFIED is used when the caller did not provide an error code.
  ERROR_CODE_UNSPECIFIED = 0;
  // ERROR_CODE_UNKNOWN is a fallback for uncategorized failures.
  ERROR_CODE_UNKNOWN = 1;
  // ERROR_CODE_INVALID_ARGUMENT indicates request validation failed.
  ERROR_CODE_INVALID_ARGUMENT = 2;
  // ERROR_CODE_NOT_FOUND indicates the requested server or resource does not exist.
  ERROR_CODE_NOT_FOUND = 3;
  // ERROR_CODE_CONFLICT indicates the requested operation conflicts with current state.
  ERROR_CODE_CONFLICT = 4;
  // ERROR_CODE_PERMISSION_DENIED indicates the caller lacks authorization.
  ERROR_CODE_PERMISSION_DENIED = 5;
  // ERROR_CODE_RESOURCE_EXHAUSTED indicates a quota, limit, or capacity issue.
  ERROR_CODE_RESOURCE_EXHAUSTED = 6;
  // ERROR_CODE_UNAVAILABLE indicates a dependency or agent is temporarily unavailable.
  ERROR_CODE_UNAVAILABLE = 7;
  // ERROR_CODE_TIMEOUT indicates the operation exceeded its deadline.
  ERROR_CODE_TIMEOUT = 8;
  // ERROR_CODE_INTERNAL indicates an unexpected server-side failure.
  ERROR_CODE_INTERNAL = 9;
}

// ConsoleStream identifies the origin stream of console output.
enum ConsoleStream {
  // CONSOLE_STREAM_UNSPECIFIED is used when the output source is unknown.
  CONSOLE_STREAM_UNSPECIFIED = 0;
  // CONSOLE_STREAM_STDOUT represents standard output from the server process.
  CONSOLE_STREAM_STDOUT = 1;
  // CONSOLE_STREAM_STDERR represents standard error from the server process.
  CONSOLE_STREAM_STDERR = 2;
  // CONSOLE_STREAM_SYSTEM represents agent-generated lifecycle or system output.
  CONSOLE_STREAM_SYSTEM = 3;
}

// Error contains structured error information returned inside successful transport envelopes.
message Error {
  reserved 100 to 199;

  // code is the stable machine-readable classification of the error.
  ErrorCode code = 1;
  // message is a human-readable description safe to surface in logs or UI.
  string message = 2;
}

// ResourceUsage captures a point-in-time usage sample for a server.
message ResourceUsage {
  reserved 100 to 199;

  // cpu_percent is the total CPU consumption as a percentage of the assigned quota.
  double cpu_percent = 1;
  // memory_mb is the resident memory usage in mebibytes.
  uint64 memory_mb = 2;
  // disk_mb is the used disk footprint in mebibytes.
  uint64 disk_mb = 3;
  // player_count is the number of connected players seen by the server.
  uint32 player_count = 4;
}

// ServerConfig describes the desired runtime configuration for a managed server.
message ServerConfig {
  reserved 100 to 199;

  // id is the stable UUID of the server.
  string id = 1;
  // name is the operator-defined display name of the server.
  string name = 2;
  // memory_mb is the hard memory limit enforced for the server process.
  uint64 memory_mb = 3;
  // cpu_limit is the CPU quota expressed as a percentage of one full core.
  uint32 cpu_limit = 4;
  // game_type identifies the server runtime or game family, such as "minecraft".
  string game_type = 5;
  // start_command is the exact command line used to launch the server.
  string start_command = 6;
  // env_vars contains environment variables injected into the server process.
  map<string, string> env_vars = 7;
}

// AgentInfo identifies an agent instance and the platform it is running on.
message AgentInfo {
  reserved 100 to 199;

  // id is the stable UUID of the agent.
  string id = 1;
  // hostname is the host-visible machine name used for diagnostics.
  string hostname = 2;
  // os is the operating system name reported by the agent host.
  string os = 3;
  // arch is the CPU architecture reported by the agent host.
  string arch = 4;
  // version is the Drelyx agent build version.
  string version = 5;
}

// ServerRef is a lightweight reference to a single managed server.
message ServerRef {
  reserved 100 to 199;

  // id is the stable UUID of the server.
  string id = 1;
}

// ServerStatus summarizes the current runtime state and last update time of a server.
message ServerStatus {
  reserved 100 to 199;

  // server_id is the stable UUID of the server.
  string server_id = 1;
  // state is the current lifecycle state observed by the agent.
  ServerState state = 2;
  // updated_at records when the state was last refreshed.
  google.protobuf.Timestamp updated_at = 3;
  // usage contains the latest resource sample if one is available.
  ResourceUsage usage = 4;
  // error contains the latest known failure for the server when applicable.
  Error error = 5;
}
